</div>

<script>
/* L'Altra Volta — sito statico. Logica i18n + FAQ in vanilla JS
   (ricostruita dal prototipo Claude Design, senza runtime esterno). */
const AV = (function () {
  const COPY = {
    it: {
      navHome:'La casa', navVolta:'La volta', navGallery:'Galleria', navAround:'Dintorni', navContact:'Contatti',
      book:'Prenota', bookLong:'Prenota il soggiorno', discover:'Scopri la casa',
      heroEyebrow:'Casa vacanze · San Pietro Vernotico',
      heroTitle:'Sotto una volta a stella, il tuo Salento.',
      heroSub:'Un accogliente appartamento nel centro di San Pietro Vernotico, a pochi minuti dal mare e dalle spiagge più belle del Salento.',
      heroMeta:'3 posti letto · Giardino · 5 min dalla stazione',
      nameLabel:'Il nome', nameTitle:'Perché “L’Altra Volta”.',
      nameBody:'Il nome nasce dalla sua anima più autentica: una splendida volta a stella in pietra che disegna il soffitto del soggiorno, firma della tradizione costruttiva salentina. “Volta” come architettura — e come l’invito a tornare, un’altra volta, in un luogo che sa di casa.',
      homeLabel:'La casa', homeTitle:'Tutto il comfort, in ogni dettaglio.',
      homeIntro:'Un ampio soggiorno con volta a stella, una cucina completamente attrezzata, una camera confortevole, lavanderia, bagno e un grazioso giardino dove rilassarsi.',
      am1:'Ampio soggiorno con volta a stella', am2:'Cucina completamente attrezzata', am3:'Camera matrimoniale · 3 posti letto', am4:'Lavanderia dedicata', am5:'Bagno e servizio', am6:'Giardino e corte privata',
      galleryLabel:'Galleria', galleryTitle:'Ambienti curati, luce mediterranea.', gallerySub:'Dai uno sguardo agli spazi della casa.',
      locLabel:'Posizione', locTitle:'Tra centro, mare e natura.',
      locIntro:'In posizione strategica: a pochi passi dal centro di San Pietro Vernotico e a soli 5 minuti dalla stazione. Negozi, bar e supermercati nelle immediate vicinanze.',
      reviewsLabel:'Dicono di noi', reviewsTitle:'Ospiti felici.',
      faqLabel:'Informazioni utili', faqTitle:'Domande frequenti.',
      bookTitle:'Prenota il tuo soggiorno.', bookSub:'Scrivici su WhatsApp o chiamaci: ti rispondiamo in poco tempo.',
      addr:'San Pietro Vernotico (BR) · Puglia',
      reachWa:'Scrivi su WhatsApp', reachCall:'Chiama',
      rights:'Tutti i diritti riservati'
    },
    en: {
      navHome:'The home', navVolta:'The vault', navGallery:'Gallery', navAround:'Surroundings', navContact:'Contact',
      book:'Book', bookLong:'Book your stay', discover:'Explore the home',
      heroEyebrow:'Holiday home · San Pietro Vernotico',
      heroTitle:'Beneath a star vault, your Salento.',
      heroSub:'A welcoming apartment in the centre of San Pietro Vernotico, minutes from the sea and Salento’s most beautiful beaches.',
      heroMeta:'Sleeps 3 · Garden · 5 min from the station',
      nameLabel:'The name', nameTitle:'Why “L’Altra Volta”.',
      nameBody:'The name comes from its most authentic feature: a beautiful stone star vault that shapes the living-room ceiling — a signature of Salento craftsmanship. In Italian “volta” means both vault and “time”: an invitation to return, one more time, to a place that feels like home.',
      homeLabel:'The home', homeTitle:'Every comfort, in every detail.',
      homeIntro:'A spacious living room beneath the star vault, a fully-equipped kitchen, a comfortable bedroom, laundry, bathroom and a lovely garden to unwind in.',
      am1:'Spacious living room with star vault', am2:'Fully-equipped kitchen', am3:'Double bedroom · sleeps 3', am4:'Dedicated laundry', am5:'Bathroom & WC', am6:'Garden & private courtyard',
      galleryLabel:'Gallery', galleryTitle:'Cared-for spaces, Mediterranean light.', gallerySub:'Take a look around the home.',
      locLabel:'Location', locTitle:'Between town, sea and nature.',
      locIntro:'A strategic location: steps from the centre of San Pietro Vernotico and just 5 minutes from the station. Shops, cafés and supermarkets all nearby.',
      reviewsLabel:'Guest words', reviewsTitle:'Happy guests.',
      faqLabel:'Good to know', faqTitle:'Frequently asked.',
      bookTitle:'Book your stay.', bookSub:'Message us on WhatsApp or give us a call — we reply quickly.',
      addr:'San Pietro Vernotico (BR) · Apulia',
      reachWa:'Message on WhatsApp', reachCall:'Call',
      rights:'All rights reserved'
    }
  };

  const DISTANCES = {
    it: [
      { place:'Centro del paese', dist:'a pochi passi' },
      { place:'Stazione ferroviaria', dist:'5 min' },
      { place:'Carrisiland · Cellino San Marco', dist:'2 km' },
      { place:'Campo di Mare', dist:'8 km' },
      { place:'Porto Cesareo', dist:'35 km' }
    ],
    en: [
      { place:'Town centre', dist:'steps away' },
      { place:'Railway station', dist:'5 min' },
      { place:'Carrisiland water park · Cellino S. Marco', dist:'2 km' },
      { place:'Campo di Mare beach', dist:'8 km' },
      { place:'Porto Cesareo beach', dist:'35 km' }
    ]
  };

  const REVIEWS = {
    it: [
      { quote:'Una casa bellissima e curata nei minimi dettagli. La volta in pietra è uno spettacolo e la posizione comodissima.', who:'Giulia · Bologna' },
      { quote:'Accoglienza impeccabile e tutto pulitissimo. Punto di partenza perfetto per le spiagge del Salento.', who:'Marco · Milano' },
      { quote:'Ci siamo sentiti subito a casa. Torneremo di sicuro un’altra volta!', who:'Sara & Luca · Torino' }
    ],
    en: [
      { quote:'A beautiful home, cared for in every detail. The stone vault is stunning and the location is so convenient.', who:'Giulia · Bologna' },
      { quote:'Impeccable welcome and spotlessly clean. The perfect base for Salento’s beaches.', who:'Marco · Milan' },
      { quote:'We felt at home straight away. We’ll definitely be back another time!', who:'Sara & Luca · Turin' }
    ]
  };

  const FAQS = {
    it: [
      { q:'Orari di check-in e check-out?', a:'Check-in dalle 15:00, check-out entro le 10:30. Orari flessibili su richiesta: basta segnalarcelo.' },
      { q:'Sono ammessi gli animali?', a:'Ci dispiace, ma la casa non accetta animali domestici.' },
      { q:'Quanti ospiti può ospitare?', a:'La casa dispone di 3 posti letto, con camera matrimoniale e un letto aggiuntivo.' },
      { q:'C’è parcheggio e Wi-Fi?', a:'Parcheggio libero nelle vicinanze, in centro paese, e connessione Wi-Fi gratuita in tutta la casa.' },
      { q:'Come si arriva?', a:'A soli 5 minuti dalla stazione di San Pietro Vernotico e comoda anche in auto. Inviamo indicazioni dettagliate dopo la prenotazione.' },
      { q:'Come posso prenotare?', a:'Il modo più rapido è WhatsApp o una telefonata. Confermiamo subito disponibilità e date.' }
    ],
    en: [
      { q:'Check-in and check-out times?', a:'Check-in from 3:00 pm, check-out by 10:30 am. Flexible times on request — just let us know.' },
      { q:'Are pets allowed?', a:'We are sorry, but pets are not allowed in the home.' },
      { q:'How many guests can stay?', a:'The home sleeps 3, with a double bedroom and an additional bed.' },
      { q:'Is there parking and Wi-Fi?', a:'Free street parking nearby in the town centre, and free Wi-Fi throughout the home.' },
      { q:'How do I get there?', a:'Just 5 minutes from San Pietro Vernotico station and easy by car. We send detailed directions after booking.' },
      { q:'How can I book?', a:'The fastest way is WhatsApp or a phone call. We confirm availability and dates right away.' }
    ]
  };

  const ACCENT = '#8A7A3F', SOFT = '#9a9079';
  let lang = 'it';
  let openFaq = 0;

  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  function renderText() {
    const t = COPY[lang];
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const k = el.getAttribute('data-i18n');
      if (t[k] != null) el.textContent = t[k];
    });
    document.documentElement.lang = lang;
    document.getElementById('lang-it').style.color = (lang === 'en') ? SOFT : ACCENT;
    document.getElementById('lang-en').style.color = (lang === 'en') ? ACCENT : SOFT;
  }

  function renderDistances() {
    document.getElementById('distances').innerHTML = DISTANCES[lang].map(d => `
      <div style="display:flex;align-items:baseline;justify-content:space-between;gap:14px;padding:14px 0;border-bottom:1px solid rgba(42,36,23,.12)">
        <span style="font-size:15.5px;color:#2A2417">${esc(d.place)}</span>
        <span style="flex:1;border-bottom:1px dotted rgba(42,36,23,.25);transform:translateY(-4px)"></span>
        <span style="font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:#8A7A3F;white-space:nowrap">${esc(d.dist)}</span>
      </div>`).join('');
  }

  function renderReviews() {
    document.getElementById('reviews').innerHTML = REVIEWS[lang].map(r => `
      <div style="background:#F5EEE0;border:1px solid rgba(42,36,23,.10);padding:32px 28px;display:flex;flex-direction:column;gap:18px">
        <span style="font-family:'Cormorant Garamond',serif;font-size:30px;line-height:0;color:#8A7A3F;height:14px">&ldquo;</span>
        <p style="margin:0;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:18.5px;line-height:1.5;color:#3a3327">${esc(r.quote)}</p>
        <span style="font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#8a8268;margin-top:auto">${esc(r.who)}</span>
      </div>`).join('');
  }

  function renderFaqs() {
    document.getElementById('faqs').innerHTML = FAQS[lang].map((f, i) => {
      const open = openFaq === i;
      return `
      <div class="av-faq" data-i="${i}" style="border-bottom:1px solid rgba(42,36,23,.14);padding:24px 4px;cursor:pointer">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:20px">
          <span style="font-size:18px;font-family:'Cormorant Garamond',serif;font-weight:500;color:#2A2417">${esc(f.q)}</span>
          <span style="font-size:22px;color:#8A7A3F;line-height:1;transition:transform .3s ease;transform:rotate(${open ? '45deg' : '0deg'})">+</span>
        </div>
        <div style="max-height:${open ? '260px' : '0'};overflow:hidden;transition:max-height .4s ease,opacity .3s ease,margin .3s ease;opacity:${open ? 1 : 0};margin-top:${open ? '14px' : '0'}">
          <p style="margin:0;max-width:640px;font-size:15.5px;line-height:1.72;color:#6E6552;font-weight:300">${esc(f.a)}</p>
        </div>
      </div>`;
    }).join('');
    document.querySelectorAll('#faqs .av-faq').forEach(el => {
      el.addEventListener('click', () => {
        const i = parseInt(el.getAttribute('data-i'), 10);
        openFaq = (openFaq === i) ? -1 : i;
        renderFaqs();
      });
    });
  }

  function renderAll() { renderText(); renderDistances(); renderReviews(); renderFaqs(); }

  function setLang(l) {
    if (l !== 'it' && l !== 'en') return;
    lang = l;
    try { localStorage.setItem('av-lang', l); } catch (e) {}
    renderAll();
  }

  function init() {
    let saved = null;
    try { saved = localStorage.getItem('av-lang'); } catch (e) {}
    if (saved === 'it' || saved === 'en') lang = saved;
    else if ((navigator.language || '').toLowerCase().indexOf('it') !== 0) lang = 'en';
    renderAll();
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();

  return { setLang };
})();

/* ============================================================
   Lightbox "wow" — apertura FLIP (la foto si espande dalla sua
   posizione) + Ken Burns mentre guardi + cross-fade tra le foto.
   Vanilla JS, autonomo. Rispetta prefers-reduced-motion.
   ============================================================ */
(function () {
  const mq = window.matchMedia ? window.matchMedia('(prefers-reduced-motion: reduce)') : { matches:false };
  const reduce = () => mq.matches;
  const L = {
    it:{ prev:'Foto precedente', next:'Foto successiva', close:'Chiudi (Esc)' },
    en:{ prev:'Previous photo', next:'Next photo', close:'Close (Esc)' }
  };
  const tr = k => (L[(document.documentElement.lang==='en')?'en':'it'])[k];

  let items = [];           // {src, alt, el}
  let idx = 0, isOpen = false, lastFocus = null;

  // ---- stile + keyframes
  const st = document.createElement('style');
  st.textContent =
    '@keyframes avkb{0%{transform:scale(1.001)}100%{transform:scale(1.08) translate(-1.4%,-1.4%)}}' +
    '#av-lb .nav,#av-lb .close{font-family:Jost,sans-serif;cursor:pointer;color:#F5EEE0;border:1px solid rgba(245,238,224,.30);background:rgba(26,22,14,.32);backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);display:flex;align-items:center;justify-content:center;transition:background .25s,border-color .25s,transform .3s,opacity .35s}' +
    '#av-lb .nav{position:absolute;top:50%;width:54px;height:54px;border-radius:50%;font-size:26px;line-height:0;margin-top:-27px}' +
    '#av-lb .nav:hover{background:rgba(138,122,63,.6);border-color:rgba(245,238,224,.65)}' +
    '#av-lb .prev{left:20px}#av-lb .next{right:20px}' +
    '#av-lb .close{position:absolute;top:20px;right:20px;width:46px;height:46px;border-radius:50%;font-size:22px}' +
    '#av-lb .close:hover{background:rgba(138,122,63,.6);transform:rotate(90deg)}' +
    '.av-gal-item img,.av-hero img,#volta img[src*="photos/"]{cursor:zoom-in}' +
    '@media(max-width:880px){#av-lb .nav{width:44px;height:44px;font-size:22px}#av-lb .prev{left:8px}#av-lb .next{right:8px}#av-lb .close{top:12px;right:12px}}';
  document.head.appendChild(st);

  // ---- overlay DOM
  const ov = document.createElement('div');
  ov.id = 'av-lb';
  ov.setAttribute('role','dialog'); ov.setAttribute('aria-modal','true');
  ov.style.cssText = 'position:fixed;inset:0;z-index:99999;display:none;flex-direction:column;align-items:center;justify-content:center;opacity:1';
  const bd = document.createElement('div');
  bd.style.cssText = 'position:absolute;inset:0;background:rgba(26,22,14,0);backdrop-filter:blur(0px);-webkit-backdrop-filter:blur(0px);transition:background .55s ease,backdrop-filter .55s ease,-webkit-backdrop-filter .55s ease';
  const stage = document.createElement('div');
  stage.style.cssText = 'position:relative;overflow:hidden;border-radius:2px;box-shadow:0 40px 90px rgba(0,0,0,.55);will-change:transform;line-height:0';
  const img = document.createElement('img');
  img.style.cssText = 'display:block;max-width:92vw;max-height:78vh;width:auto;height:auto;object-fit:contain;opacity:1;transition:opacity .28s ease';
  stage.appendChild(img);
  const cap = document.createElement('figcaption');
  cap.style.cssText = 'position:relative;margin-top:16px;color:#EFE6D4;font-family:"Cormorant Garamond",serif;font-style:italic;font-size:19px;text-align:center;text-shadow:0 1px 10px rgba(0,0,0,.45);opacity:0;transition:opacity .4s ease .1s';
  const count = document.createElement('div');
  count.style.cssText = 'position:relative;margin-top:7px;color:#bcb08f;font-size:11px;letter-spacing:.24em;text-transform:uppercase;opacity:0;transition:opacity .4s ease .1s';
  const prev = document.createElement('button'); prev.className='nav prev'; prev.type='button'; prev.innerHTML='&#8249;';
  const next = document.createElement('button'); next.className='nav next'; next.type='button'; next.innerHTML='&#8250;';
  const closeBtn = document.createElement('button'); closeBtn.className='close'; closeBtn.type='button'; closeBtn.innerHTML='&times;';
  ov.append(bd, prev, next, closeBtn, stage, cap, count);
  document.body.appendChild(ov);

  function aria(){ prev.setAttribute('aria-label',tr('prev')); next.setAttribute('aria-label',tr('next')); closeBtn.setAttribute('aria-label',tr('close')); }
  function setChrome(v){
    cap.style.opacity = v?'1':'0'; count.style.opacity = v?'1':'0';
    [prev,next,closeBtn].forEach(b=>{ b.style.opacity=v?'1':'0'; b.style.pointerEvents=v?'auto':'none'; });
  }
  function updateMeta(){
    cap.textContent = items[idx].alt || '';
    count.textContent = String(idx+1).padStart(2,'0') + ' / ' + String(items.length).padStart(2,'0');
  }
  function kbStart(){ if(reduce()) return; img.style.animation='none'; void img.offsetWidth; img.style.animation='avkb 16s ease-in-out infinite alternate'; }
  function kbStop(){ img.style.animation='none'; }
  function inView(el){ const r=el.getBoundingClientRect(); return r.bottom>0 && r.top<innerHeight && r.right>0 && r.left<innerWidth; }

  function flipFrom(srcEl){
    if(reduce() || !srcEl){ ov.style.opacity='0'; void ov.offsetWidth; ov.style.transition='opacity .35s ease'; ov.style.opacity='1'; return; }
    const sr=srcEl.getBoundingClientRect(), t=stage.getBoundingClientRect();
    if(!t.width) return;
    const dx=(sr.left+sr.width/2)-(t.left+t.width/2);
    const dy=(sr.top+sr.height/2)-(t.top+t.height/2);
    const sc=Math.max(0.04, sr.width/t.width);
    stage.style.transition='none';
    stage.style.transform='translate('+dx+'px,'+dy+'px) scale('+sc+')';
    void stage.offsetWidth;
    stage.style.transition='transform .58s cubic-bezier(.2,.85,.25,1)';
    stage.style.transform='none';
  }

  function openAt(i, srcEl){
    if(!items.length) return;
    idx=i; isOpen=true; lastFocus=document.activeElement;
    aria(); updateMeta();
    document.body.style.overflow='hidden';
    ov.style.display='flex'; ov.style.opacity='1';
    kbStop(); img.style.opacity='1'; img.alt = items[idx].alt||'';
    const run = ()=>{
      bd.style.background='rgba(26,22,14,.85)'; bd.style.backdropFilter='blur(9px)'; bd.style.webkitBackdropFilter='blur(9px)';
      requestAnimationFrame(()=>{ flipFrom(srcEl); kbStart(); setChrome(true); });
      try{ closeBtn.focus({preventScroll:true}); }catch(e){ closeBtn.focus(); }
    };
    img.onload=null; img.src=items[idx].src;
    if(img.complete && img.naturalWidth) run();
    else { img.onload=()=>{ img.onload=null; run(); }; img.onerror=()=>{ img.onload=null; run(); }; }
  }

  function crossfade(){
    img.style.opacity='0';
    setTimeout(()=>{
      img.onload=null; img.src=items[idx].src; img.alt=items[idx].alt||'';
      const show=()=>{ void img.offsetWidth; img.style.opacity='1'; kbStart(); };
      if(img.complete && img.naturalWidth) show(); else { img.onload=()=>{ img.onload=null; show(); }; }
    },150);
  }
  function nav(dir){ if(!isOpen) return; idx=(idx+dir+items.length)%items.length; updateMeta(); crossfade(); }

  function closeLb(){
    if(!isOpen) return; isOpen=false;
    setChrome(false); kbStop();
    bd.style.background='rgba(26,22,14,0)'; bd.style.backdropFilter='blur(0px)'; bd.style.webkitBackdropFilter='blur(0px)';
    const srcEl = items[idx] && items[idx].el;
    const finish=()=>{ ov.style.display='none'; ov.style.opacity='1'; ov.style.transition=''; stage.style.transition='none'; stage.style.transform='none'; img.style.opacity='1'; document.body.style.overflow=''; if(lastFocus&&lastFocus.focus){ try{lastFocus.focus({preventScroll:true});}catch(e){} } };
    if(!reduce() && srcEl && inView(srcEl)){
      const sr=srcEl.getBoundingClientRect(), t=stage.getBoundingClientRect();
      const dx=(sr.left+sr.width/2)-(t.left+t.width/2);
      const dy=(sr.top+sr.height/2)-(t.top+t.height/2);
      const sc=Math.max(0.04, sr.width/t.width);
      stage.style.transition='transform .5s cubic-bezier(.4,0,.2,1)';
      stage.style.transform='translate('+dx+'px,'+dy+'px) scale('+sc+')';
      let done=false; const end=()=>{ if(done)return; done=true; finish(); };
      stage.addEventListener('transitionend', end, {once:true});
      setTimeout(end, 640);
    } else {
      ov.style.transition='opacity .35s ease'; ov.style.opacity='0';
      setTimeout(finish, 360);
    }
  }

  // ---- eventi
  prev.addEventListener('click', e=>{ e.stopPropagation(); nav(-1); });
  next.addEventListener('click', e=>{ e.stopPropagation(); nav(1); });
  closeBtn.addEventListener('click', e=>{ e.stopPropagation(); closeLb(); });
  bd.addEventListener('click', closeLb);
  ov.addEventListener('click', e=>{ if(e.target===ov) closeLb(); });
  stage.addEventListener('click', e=>{ e.stopPropagation(); });
  document.addEventListener('keydown', e=>{
    if(!isOpen) return;
    if(e.key==='Escape'){ closeLb(); }
    else if(e.key==='ArrowRight'){ nav(1); }
    else if(e.key==='ArrowLeft'){ nav(-1); }
    else if(e.key==='Tab'){ const f=[closeBtn,prev,next]; const i=f.indexOf(document.activeElement); e.preventDefault(); f[(i+(e.shiftKey?-1:1)+f.length)%f.length].focus(); }
  });
  let tsx=0, tsy=0;
  ov.addEventListener('touchstart', e=>{ const t=e.changedTouches[0]; tsx=t.clientX; tsy=t.clientY; }, {passive:true});
  ov.addEventListener('touchend', e=>{ const t=e.changedTouches[0]; const dx=t.clientX-tsx, dy=t.clientY-tsy;
    if(Math.abs(dx)>50 && Math.abs(dx)>Math.abs(dy)) nav(dx<0?1:-1);
    else if(dy>70 && Math.abs(dy)>Math.abs(dx)) closeLb();
  }, {passive:true});
  window.addEventListener('resize', ()=>{ if(isOpen){ stage.style.transition='none'; stage.style.transform='none'; } });

  // ---- raccolta immagini + trigger
  function bind(){
    const gal = Array.prototype.slice.call(document.querySelectorAll('#galleria .av-gal-item img'));
    items = gal.map(im=>({ src:im.getAttribute('src'), alt:im.getAttribute('alt')||'', el:im }));
    gal.forEach((im,i)=>{ im.addEventListener('click', ()=>openAt(i, im)); });
    const extras=[];
    const hero=document.querySelector('.av-hero img'); if(hero) extras.push(hero);
    const volta=document.querySelector('#volta img[src*="photos/"]'); if(volta) extras.push(volta);
    extras.forEach(im=>{
      const src=im.getAttribute('src');
      im.addEventListener('click', ()=>{
        let i=items.findIndex(it=>it.src===src);
        if(i<0){ items.push({src:src, alt:im.getAttribute('alt')||'', el:im}); i=items.length-1; }
        openAt(i, im);
      });
    });
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', bind); else bind();
})();
</script>
